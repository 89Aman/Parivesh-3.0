steps:
  # Step 1: Build frontend — runs npm in Cloud Build's managed environment,
  # isolated from Docker, so network retries are handled by Node/npm natively.
  - name: 'node:22-alpine'
    id: 'build-frontend'
    dir: 'frontend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm config set fetch-retries 5
        npm config set fetch-retry-mintimeout 20000
        npm config set fetch-retry-maxtimeout 120000
        npm config set fetch-timeout 300000
        npm ci
        VITE_API_BASE_URL=/api/v1 npm run build

  # Step 2: Build and tag the Docker image.
  # Uses Dockerfile.cloudrun which copies the pre-built dist from step 1.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - build
      - -f
      - Dockerfile.cloudrun
      - -t
      - 'gcr.io/$PROJECT_ID/parivesh:$COMMIT_SHA'
      - -t
      - 'gcr.io/$PROJECT_ID/parivesh:latest'
      - .

  # Step 3: Deploy to Cloud Run.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - parivesh
      - --image=gcr.io/$PROJECT_ID/parivesh:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080

images:
  - 'gcr.io/$PROJECT_ID/parivesh:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/parivesh:latest'

options:
  logging: CLOUD_LOGGING_ONLY
